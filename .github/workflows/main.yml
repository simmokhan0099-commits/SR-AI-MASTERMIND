name: Build SR-AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Build Android APK
        uses: simple-elf/github-action-pwa-to-apk@v1
        with:
          # Ye link automatically tumhare project ko utha lega
          url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          name: SR-AI Mastermind
          
