name: Build Android APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK (Bina Cache ke)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install --global @bubblewrap/cli

      - name: Generate Android APK from PWA
        run: |
          mkdir -p ./pwa-apk
          yes | bubblewrap init --manifest=https://simmokhan0099-commits.github.io/SR-AI-MASTERMIND/manifest.json --directory=./pwa-apk
          cd ./pwa-apk
          yes | bubblewrap build

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SR-AI-Mastermind-APK
          path: ./pwa-apk/app-release-unsigned.apk
          
